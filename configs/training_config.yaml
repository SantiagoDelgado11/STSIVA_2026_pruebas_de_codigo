seed: 7
device: cuda
gpu_id: 0

# Diffusion backbone
weights: weights/d_lodo_e_1000_bs_4_lr_0.0003_seed_2_img_256_schedule_cosine_gpu_1_c_1_si_100/checkpoints/latest.pth.tar
image_size: 256
num_channels: 64
num_res_blocks: 3
input_channels: 1

# Data and forward model
dataset_root: data/test_imgs
batch_size: 16
sampling_ratio: 0.1666666667
sampling_method: random
measurement_noise_std: 0.0

# RL setup
num_episodes: 50
gamma: 1.0
learning_rate: 0.0001
weight_decay: 0.0
grad_clip_norm: 1.0
value_coef: 0.5
entropy_coef: 0.01
max_env_steps: 1

# Solver hyperparameters
solver_diffpir:
  noise_steps: 1000
  schedule_name: linear
  cg_iters: 20
  iter_num: 20
  noise_level_img: 0.0
  eta: 0.0
  zeta: 1.0

solver_dps:
  noise_steps: 1000
  schedule_name: cosine
  scale: 0.0125

solver_ddnm:
  noise_steps: 1000
  schedule_name: cosine
  eta: 1.0

# Logging and checkpoints
checkpoint_dir: weights/rl_solver_selector
checkpoint_every: 10
